- type: entity
  parent: BaseGameRule
  id: BaseShadowDemonRule
  abstract: true
  components:
  - type: AntagSpawner
    prototype: BaseMobShadowDemon
  - type: AntagRandomSpawn

- type: entity
  parent: BaseShadowDemonRule
  id: ShadowDemonSummon
  components:
  - type: AntagSelection
    agentName: shadow-demon-round-end-agent-name
    definitions:
    - spawnerPrototype: SpawnPointGhostShadowDemon
      min: 1
      max: 1
      pickPlayer: false
      mindRoles:
      - MindRoleShadowDemon
      briefing:
        text: shadow-demon-role-greeting
        color: Red
        sound: /Audio/_Trauma/Mobs/ShadowDemon/briefing/shadowdemonbriefing.ogg
      components:
      - type: RandomMetadata  # Left as is since they are demonic names
        nameSegments:
        - NamesSlaughterTitle
        - NamesSlaughter
        nameFormat: name-format-slaughter
      - type: LightImmunity # Grants temporary light immunity so it survives AntagRandomSpawn | Remove once we get better spawns
        duration: 20
