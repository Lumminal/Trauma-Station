- type: entity
  parent: ShadowDemonSummon
  id: TokenShadowDemon
  components:
  - type: AntagSelection
    agentName: shadow-demon-round-end-agent-name
    definitions:
    - spawnerPrototype: SpawnPointShadowDemonToken
      min: 1
      max: 1
      pickPlayer: false
      mindRoles:
      - MindRoleShadowDemon
      briefing:
        text: shadow-demon-role-greeting
        color: Red
      components:
      - type: RandomMetadata
        nameSegments:
        - NamesSlaughterTitle
        - NamesSlaughter
        nameFormat: name-format-slaughter
      - type: LightImmunity # Grants temporary light immunity so it survives AntagRandomSpawn | Remove once we get better spawns
        duration: 20
