- type: entity
  parent:
  - SimpleSpaceMobBase
  id: BaseMobShadowDemon
  name: shadow demon
  suffix: ""
  description: A creature that's barely tangible, you can feel its gaze piercing you.
  components:
  - type: Sprite
    sprite: _Trauma/ShadowDemon/demon.rsi
    state: shadow_demon
  - type: Stamina
    baseCritThreshold: 150
  - type: NightVision
    color: "#AA4A44"
    activateSound: null
    deactivateSound: null
  - type: Insulated
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: SlaughterDemon # placeholder
  - type: StatusEffects # Overwriting basesimplemob to remove flash
    allowed:
    - SlowedDown
    - Stutter
    - Electrocution
    - ForcedSleep
    - TemporaryBlindness
    - Pacified
    - RadiationProtection
    - Drowsiness
    - Adrenaline
  - type: MobMover
  - type: InputMover
  - type: Input
    context: "human"
  - type: InteractionOutline
  - type: NoSlip
  - type: Clickable
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-slaughter-demon-name # placeholder
    description: ghost-role-information-slaughter-demon-description # placeholder
    rules: ghost-role-information-slaughter-demon-rules # placeholder
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: Physics
    bodyType: KinematicController
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead # placeholder
  - type: Examiner
  - type: CombatMode
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Effects/demon_attack1.ogg # placeholder
    animation: WeaponArcPunch
    damage:
      types:
        Slash: 25
        Structural: 50
  - type: Evil
  - type: DemonicWhisper # allows the demon to demonic whisper
  - type: Puller
    needsHands: false
  - type: Targeting
  - type: Speech
    speechVerb: SlaughterDemon # placeholder
    speechSounds: SlaughterDemon # placeholder
  - type: TypingIndicator
    proto: guardian
  - type: Crawler
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: StandingState
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 666
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 2
  - type: NpcFactionMember
    factions:
    - DevilFaction
  #- type: ActionGrant
  #  actions:
  #  - DemonicWhisperAction
  - type: ReplacementAccent
    accent: slaughterDemon # placeholder
  - type: AlwaysTakeHoly
  - type: Hands
  - type: PressureImmunity
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Effects/demon_dies.ogg # placeholder
  - type: Vocal # placeholder
    sounds:
      Male: SlaughterDemon
      Female: SlaughterDemon
      Unsexed: SlaughterDemon
  - type: ZombieImmune
  - type: SlowOnDamage
    speedModifierThresholds:
      200: 1 # placeholder
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Sulfur
        Quantity: 300
    bleedReductionAmount: 5
  - type: TemperatureDamage
    coldDamage:
      types:
        Cold: 0
    heatDamage:
      types:
        Heat: 0
    heatDamageThreshold: 666
    coldDamageThreshold: 66
  # - type: LightDetection TODO: add when done playtesting
  # - type: LightDetectionDamage TODO: add when done playtesting
